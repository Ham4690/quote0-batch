name: ci

# PR / main への push でコード品質(lint + test)を検証する。
# 外部 API を叩かずモックでテストするため secrets 不要 → fork PR でも安全に走る。
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read # 最小権限

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # ハング時の課金/枠消費を遮断
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache: false # 外部依存(go.sum)未生成のためキャッシュ無効
      - name: golangci-lint (go vet 内包 + lint)
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2 # .golangci.yml(version: "2")と揃える
      - name: go test
        run: go test ./... # httptest でモック(ネットワーク非依存・secrets 不要)
